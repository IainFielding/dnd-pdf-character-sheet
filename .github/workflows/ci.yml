# Continuous integration: JSON validation and script syntax checks.
#
# Runs on every push and pull request. This is separate from the release workflow
# (main.yml), which only fires when a GitHub release is published.
#
# This module has no build step or npm toolchain, so CI stays dependency-free:
# it validates the manifest and language files as JSON and syntax-checks the ES
# modules. That catches the "stray comma" class of errors that would otherwise
# only surface when Foundry loads the module.
name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      # Pin Node so `node --test` (needs Node 18+) runs on a known version rather than
      # whatever the runner image happens to ship.
      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: "20"

      # Fail fast if the manifest or a language file isn't valid JSON — Foundry
      # parses these at load and there is no build step to catch a stray comma.
      # package.json is validated too: nothing is installed from it, but GitHub's
      # dependency graph parses it to raise Dependabot alerts for the vendored pdf-lib.
      - name: Validate JSON
        run: |
          jq empty module.json
          jq empty package.json
          for f in lang/*.json; do jq empty "$f"; done

      # Verify lib/pdf-lib.min.js is byte-identical (modulo CRLF) to the official npm
      # dist file of the version pinned in package.json — that pin is what Dependabot
      # watches for CVEs, so it must describe the file actually shipped. When
      # re-vendoring, update the pin, this hash, and governance/technical-details.md §2.
      - name: Verify vendored pdf-lib integrity
        run: |
          expected="0f9a5cad07941f0826586c94e089d89b918c46e5c17cf2d5a3c6f666e3bc694f"
          actual=$(tr -d '\r' < lib/pdf-lib.min.js | sha256sum | cut -d' ' -f1)
          if [ "$actual" != "$expected" ]; then
            echo "lib/pdf-lib.min.js does not match pdf-lib $(jq -r '.dependencies["pdf-lib"]' package.json): expected sha256 $expected, got $actual" >&2
            exit 1
          fi

      # Syntax-check the ES modules without executing them, so a typo can't ship.
      # lib/ is excluded: it holds the minified pdf-lib vendor bundle.
      - name: Syntax-check scripts
        run: |
          find scripts -name '*.mjs' -print0 | xargs -0 -I{} node --check "{}"

      # Run the unit tests for the pure helpers and the field-name maps. Uses Node's built-in
      # test runner, so CI stays dependency-free (no npm install). The tests import scripts/main.mjs
      # directly — its Foundry hook registration is guarded behind `globalThis.Hooks`, absent here.
      - name: Run tests
        run: node --test
